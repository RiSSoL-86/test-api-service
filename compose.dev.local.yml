services:
  kafka:
    image: apache/kafka:3.7.0
    restart: always
    container_name: kafka-go-local
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,PLAINTEXT_HOST://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_HEALTHCHECK_BOOTSTRAP_SERVER: localhost:9092
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server \"$${KAFKA_HEALTHCHECK_BOOTSTRAP_SERVER}\" --list >/dev/null 2>&1" ]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "29092:29092"
    logging:
      driver: "json-file"
      options:
        max-size: "500m"

  kafka-init:
    image: apache/kafka:3.7.0
    container_name: kafka-init-go-local
    environment:
      KAFKA_INIT_BOOTSTRAP_SERVER: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: [ "/bin/sh", "-c" ]
    command:
      - >
        /opt/kafka/bin/kafka-topics.sh
        --bootstrap-server "$${KAFKA_INIT_BOOTSTRAP_SERVER}"
        --create
        --if-not-exists
        --topic orders.commands
        --partitions 3
        --replication-factor 1
    logging:
      driver: "json-file"
      options:
        max-size: "500m"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    restart: always
    container_name: kafka-ui-go-local
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8081:8080"
    logging:
      driver: "json-file"
      options:
        max-size: "500m"
