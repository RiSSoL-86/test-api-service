services:
  kafka:
    image: apache/kafka:3.7.0
    restart: always
    container_name: kafka-go-local
    network_mode: host
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS
      - KAFKA_LISTENERS
      - KAFKA_ADVERTISED_LISTENERS
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_HEALTHCHECK_BOOTSTRAP_SERVER
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server \"$${KAFKA_HEALTHCHECK_BOOTSTRAP_SERVER}\" --list >/dev/null 2>&1" ]
      interval: 5s
      timeout: 5s
      retries: 10
    logging:
      driver: "json-file"
      options:
        max-size: "500m"

  kafka-init:
    image: apache/kafka:3.7.0
    container_name: kafka-init-go-local
    network_mode: host
    environment:
      - KAFKA_INIT_BOOTSTRAP_SERVER
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: [ "/bin/sh", "-c" ]
    command:
      - >
        /opt/kafka/bin/kafka-topics.sh
        --bootstrap-server "$${KAFKA_INIT_BOOTSTRAP_SERVER}"
        --create
        --if-not-exists
        --topic orders
        --partitions 3
        --replication-factor 1
    logging:
      driver: "json-file"
      options:
        max-size: "500m"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    restart: always
    container_name: kafka-ui-go-local
    network_mode: host
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      - KAFKA_CLUSTERS_0_NAME
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS
      - SERVER_PORT
    logging:
      driver: "json-file"
      options:
        max-size: "500m"
